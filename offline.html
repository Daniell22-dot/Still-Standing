<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline - STILL STANDING</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .offline-container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .offline-icon {
            font-size: 5rem;
            margin-bottom: 20px;
            opacity: 0.8;
        }

        .offline-container h1 {
            font-size: 2.5rem;
            margin-bottom: 15px;
        }

        .offline-container p {
            font-size: 1.2rem;
            max-width: 500px;
            margin-bottom: 30px;
            opacity: 0.9;
        }

        .offline-button {
            background: white;
            color: var(--primary-color);
            padding: 15px 30px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .offline-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }
    </style>
</head>

<body>
    <div class="offline-container">
        <div class="offline-icon">
            <i class="fas fa-wifi-slash"></i>
        </div>
        <h1>You're Offline</h1>
        <p>It looks like you've lost your internet connection. Some features may not be available right now.</p>
        <a href="/" class="offline-button" onclick="window.location.reload(); return false;">
            <i class="fas fa-sync-alt"></i> Try Again
        </a>
    </div>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</body>

</html>
